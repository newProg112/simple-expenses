<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bills | Simple Books</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #f5f7fb;
      color: #102033;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 42px 20px;
    }

    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    h1 { font-size: 42px; margin-bottom: 8px; }
    h2 { margin-top: 0; }

    .muted { color: #5b6b7c; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 12px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid #dbe3ec;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea { min-height: 90px; }

    .btn {
      border: 0;
      background: #0077B6;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin: 24px 0;
    }

    .summary h2 {
      font-size: 32px;
      margin: 6px 0 0;
    }

    .bill-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eef2f7;
    }

    .bill-row:last-child { border-bottom: 0; }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2f7;
      font-size: 13px;
      font-weight: 700;
    }

    .danger { color: #b91c1c; font-weight: 700; }

    .app-nav{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:36px;
      font-weight:600;
    }

    .app-nav a{
      text-decoration:none;
      color:#1f2937;
    }

    .app-nav span{
      color:#cbd5e1;
    }

    .app-nav a.active{
      color:#0077B6;
      border-bottom:3px solid #0077B6;
      padding-bottom:4px;
    }

    .app-header{
      display:flex;
      align-items:center;
      gap:48px;
      margin-bottom:28px;
    }

    .app-brand{
      display:flex;
      align-items:center;
      text-decoration:none;
    }

    .app-brand img{
      width:80px;
      height:auto;
      display:block;
      mix-blend-mode:multiply;
      transform:translateY(-8px);
    }

    .app-nav{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:12px;
      margin-left:auto;
      margin-bottom:32px;
      font-weight:700;
    }

    @media (max-width: 760px) {
      .bill-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="app-header">

      <a class="app-brand" href="/dashboard.html">
        <img src="/assets/logo.png" alt="Simple Books logo">
      </a>

      <nav class="app-nav">
        <a href="/dashboard.html">Dashboard</a>
        <span>|</span>

        <a href="/resources/tools/invoice-generator.html">Invoices</a>
        <span>|</span>

        <a class="active" href="/resources/tools/bills.html">Bills</a>
        <span>|</span>

        <a href="/resources/tools/client-tracker.html">Clients</a>
        <span>|</span>

        <a href="https://expenses.simple-books.co.uk">Expenses</a>
        <span>|</span>

        <a href="/exports.html">Exports</a>
        <span>|</span>

        <a href="/account.html">Account</a>
      </nav>

    </header>

    <section class="summary-grid">
      <div class="card summary">
        <div class="muted">Unpaid bills</div>
        <h2 id="unpaidTotal">£0.00</h2>
      </div>

      <div class="card summary">
        <div class="muted">Paid bills</div>
        <h2 id="paidTotal">£0.00</h2>
      </div>

      <div class="card summary">
        <div class="muted">Overdue bills</div>
        <h2 id="overdueCount">0</h2>
      </div>

      <div class="card summary">
        <div class="muted">Saved bills</div>
        <h2 id="billCount">0</h2>
      </div>
    </section>

    <section class="card">
      <h2>Add bill</h2>

      <div class="grid">
        <div>
          <label>Supplier</label>
          <input id="supplier" placeholder="Supplier name">
        </div>

        <div>
          <label>Bill number</label>
          <input id="billNumber" placeholder="BILL-001">
        </div>

        <div>
          <label>Bill date</label>
          <input id="billDate" type="date">
        </div>

        <div>
          <label>Due date</label>
          <input id="dueDate" type="date">
        </div>

        <div>
          <label>Net amount (£)</label>
          <input id="netAmount" type="number" step="0.01" placeholder="100.00">
        </div>

        <div>
          <label>VAT rate</label>
          <select id="vatRate">
            <option value="0.20">20%</option>
            <option value="0.05">5%</option>
            <option value="0">0%</option>
          </select>
        </div>

        <div>
          <label>Status</label>
          <select id="status">
            <option>Unpaid</option>
            <option>Paid</option>
          </select>
        </div>
      </div>

      <label>Notes</label>
      <textarea id="notes" placeholder="Optional notes"></textarea>

      <button class="btn" onclick="saveBill()">Save bill</button>
    </section>

    <section class="card">
      <h2>Recent bills</h2>
      <div id="billsList">
        <p class="muted">No bills yet.</p>
      </div>
    </section>
  </main>

  <script type="module" src="/auth-guard.js"></script>

  <script>
    function getBills() {
      return JSON.parse(localStorage.getItem("simpleBooksBills") || "[]");
    }

    function saveBills(bills) {
      localStorage.setItem("simpleBooksBills", JSON.stringify(bills));
    }

    function money(value) {
      return "£" + Number(value || 0).toFixed(2);
    }

    function isOverdue(bill) {
      if (bill.status === "Paid" || !bill.dueDate) return false;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const due = new Date(bill.dueDate);
      due.setHours(0, 0, 0, 0);

      return due < today;
    }

    function saveBill() {
      const supplier = document.getElementById("supplier").value.trim();

      if (!supplier) {
        alert("Enter a supplier name.");
        return;
      }

      const net = Number(document.getElementById("netAmount").value || 0);
      const vatRate = Number(document.getElementById("vatRate").value || 0);
      const vat = net * vatRate;
      const total = net + vat;

      const bill = {
        id: Date.now(),
        supplier,
        billNumber: document.getElementById("billNumber").value.trim(),
        billDate: document.getElementById("billDate").value,
        dueDate: document.getElementById("dueDate").value,
        net,
        vatRate,
        vat,
        total,
        status: document.getElementById("status").value,
        notes: document.getElementById("notes").value.trim(),
        createdAt: new Date().toISOString()
      };

      const bills = getBills();
      bills.unshift(bill);
      saveBills(bills);

      clearForm();
      renderBills();
      alert("Bill saved.");
    }

    function clearForm() {
      document.getElementById("supplier").value = "";
      document.getElementById("billNumber").value = "";
      document.getElementById("billDate").value = "";
      document.getElementById("dueDate").value = "";
      document.getElementById("netAmount").value = "";
      document.getElementById("vatRate").value = "0.20";
      document.getElementById("status").value = "Unpaid";
      document.getElementById("notes").value = "";
    }

    function markBillPaid(id) {
      const bills = getBills();
      const bill = bills.find(b => b.id === id);

      if (bill) {
        bill.status = "Paid";
        bill.paidAt = new Date().toISOString();
        saveBills(bills);
        renderBills();
      }
    }

    function deleteBill(id) {
      if (!confirm("Delete this bill?")) return;

      const bills = getBills().filter(b => b.id !== id);
      saveBills(bills);
      renderBills();
    }

    function renderBills() {
      const bills = getBills();

      const unpaid = bills
        .filter(b => b.status !== "Paid")
        .reduce((sum, b) => sum + Number(b.total || 0), 0);

      const paid = bills
        .filter(b => b.status === "Paid")
        .reduce((sum, b) => sum + Number(b.total || 0), 0);

      const overdue = bills.filter(isOverdue).length;

      document.getElementById("unpaidTotal").textContent = money(unpaid);
      document.getElementById("paidTotal").textContent = money(paid);
      document.getElementById("overdueCount").textContent = overdue;
      document.getElementById("billCount").textContent = bills.length;

      const list = document.getElementById("billsList");

      if (bills.length === 0) {
        list.innerHTML = `<p class="muted">No bills yet.</p>`;
        return;
      }

      list.innerHTML = bills.map(bill => `
        <div class="bill-row">
          <div>
            <strong>${bill.supplier}</strong><br>
            <span class="muted">${bill.billNumber || "No bill number"}</span>
          </div>

          <div>
            <span class="muted">Due</span><br>
            <strong class="${isOverdue(bill) ? "danger" : ""}">
              ${bill.dueDate || "No due date"}
            </strong>
          </div>

          <div>
            <span class="muted">Total</span><br>
            <strong>${money(bill.total)}</strong>
          </div>

          <div>
            <span class="pill">${bill.status}</span>
          </div>

          <div>
            ${bill.status !== "Paid"
              ? `<button class="btn" onclick="markBillPaid(${bill.id})">Mark paid</button>`
              : ""}
            <button class="btn" onclick="deleteBill(${bill.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    renderBills();
  </script>
</body>
</html>
